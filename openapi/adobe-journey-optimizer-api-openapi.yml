components:
  parameters:
    sandboxHeader:
      name: x-sandbox-name
      in: header
      required: true
      description: The sandbox name.
      schema:
        type: string
        default: prod
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKey:
      type: apiKey
      in: header
      name: x-api-key
  schemas:
    JourneyList:
      type: object
      properties:
        journeys:
          type: array
          items:
            $ref: '#/components/schemas/Journey'
        totalCount:
          type: integer
    Journey:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
          - draft
          - live
          - stopped
          - closed
        version:
          type: string
        createdAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time
    JourneyInput:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        description:
          type: string
        entryCondition:
          type: object
        activities:
          type: array
          items:
            type: object
    CampaignList:
      type: object
      properties:
        campaigns:
          type: array
          items:
            $ref: '#/components/schemas/Campaign'
        totalCount:
          type: integer
    Campaign:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        channel:
          type: string
          enum:
          - email
          - push
          - sms
          - inApp
        status:
          type: string
          enum:
          - draft
          - scheduled
          - live
          - completed
        schedule:
          type: object
          properties:
            startDate:
              type: string
              format: date-time
            endDate:
              type: string
              format: date-time
    CampaignInput:
      type: object
      required:
      - name
      - channel
      properties:
        name:
          type: string
        description:
          type: string
        channel:
          type: string
          enum:
          - email
          - push
          - sms
          - inApp
        audienceId:
          type: string
        schedule:
          type: object
    MessageList:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        totalCount:
          type: integer
    Message:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        channel:
          type: string
        status:
          type: string
        content:
          type: object
    MessageInput:
      type: object
      required:
      - name
      - channel
      properties:
        name:
          type: string
        channel:
          type: string
          enum:
          - email
          - push
          - sms
          - inApp
        content:
          type: object
    OfferList:
      type: object
      properties:
        offers:
          type: array
          items:
            $ref: '#/components/schemas/Offer'
        totalCount:
          type: integer
    Offer:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum:
          - draft
          - approved
          - archived
        representations:
          type: array
          items:
            type: object
            properties:
              channel:
                type: string
              placement:
                type: string
              content:
                type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        priority:
          type: integer
    OfferInput:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        representations:
          type: array
          items:
            type: object
        eligibilityRule:
          type: string
        priority:
          type: integer
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
    PlacementList:
      type: object
      properties:
        placements:
          type: array
          items:
            $ref: '#/components/schemas/Placement'
    Placement:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        channel:
          type: string
        contentType:
          type: string
    PlacementInput:
      type: object
      required:
      - name
      - channel
      - contentType
      properties:
        name:
          type: string
        channel:
          type: string
        contentType:
          type: string
    CollectionList:
      type: object
      properties:
        collections:
          type: array
          items:
            $ref: '#/components/schemas/Collection'
    Collection:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        filter:
          type: object
    CollectionInput:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        filter:
          type: object
    DecisionRuleList:
      type: object
      properties:
        decisionRules:
          type: array
          items:
            $ref: '#/components/schemas/DecisionRule'
    DecisionRule:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        condition:
          type: string
    DecisionRuleInput:
      type: object
      required:
      - name
      - condition
      properties:
        name:
          type: string
        description:
          type: string
        condition:
          type: string
    ContentTemplateList:
      type: object
      properties:
        templates:
          type: array
          items:
            $ref: '#/components/schemas/ContentTemplate'
        totalCount:
          type: integer
    ContentTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        channel:
          type: string
        content:
          type: object
        createdAt:
          type: string
          format: date-time
    ContentTemplateInput:
      type: object
      required:
      - name
      - channel
      properties:
        name:
          type: string
        channel:
          type: string
          enum:
          - email
          - push
          - sms
          - inApp
        content:
          type: object
