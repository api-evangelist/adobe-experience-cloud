    apiKey:
      type: apiKey
      in: header
      name: x-api-key
      description: Adobe I/O client API key.
  schemas:
    ReportRequest:
      type: object
      properties:
        rsid:
          type: string
          description: Report suite ID.
        globalFilters:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              dateRange:
                type: string
