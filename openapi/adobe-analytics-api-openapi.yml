            metrics:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
        dimension:
          type: string
        settings:
          type: object
          properties:
            limit:
              type: integer
            page:
              type: integer
    ReportResponse:
      type: object
      properties:
        totalPages:
          type: integer
        firstPage:
          type: boolean
        lastPage:
          type: boolean
        numberOfElements:
          type: integer
        totalElements:
          type: integer
        rows:
          type: array
          items:
            type: object
            properties:
              itemId:
                type: string
              value:
                type: string
              data:
                type: array
                items:
                  type: number
    ReportSuiteList:
