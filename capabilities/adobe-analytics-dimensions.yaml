naftiko: 1.0.0-alpha2
info:
  label: Adobe Experience Cloud Adobe Analytics 2.0 API — Dimensions
  description: 'Adobe Experience Cloud Adobe Analytics 2.0 API — Dimensions. 1 operations. Lead operation: Adobe Analytics
    Adobe Experience Cloud List Dimensions. Self-contained Naftiko capability covering one Adobe Experience Cloud business
    surface.'
  tags:
  - Adobe Experience Cloud
  - Dimensions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADOBE_EXPERIENCE_CLOUD_API_KEY: ADOBE_EXPERIENCE_CLOUD_API_KEY
capability:
  consumes:
  - type: http
    namespace: adobe-analytics-dimensions
    baseUri: https://analytics.adobe.io
    description: Adobe Experience Cloud Adobe Analytics 2.0 API — Dimensions business capability. Self-contained, no shared
      references.
    resources:
    - name: api-companyId-dimensions
      path: /api/{companyId}/dimensions
      operations:
      - name: listdimensions
        method: GET
        description: Adobe Analytics Adobe Experience Cloud List Dimensions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: companyId
          in: path
          type: string
          required: true
        - name: rsid
          in: query
          type: string
          description: Report suite ID.
          required: true
    authentication:
      type: bearer
      token: '{{env.ADOBE_EXPERIENCE_CLOUD_API_KEY}}'
  exposes:
  - type: rest
    namespace: adobe-analytics-dimensions-rest
    port: 8080
    description: REST adapter for Adobe Experience Cloud Adobe Analytics 2.0 API — Dimensions. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/api/{companyid}/dimensions
      name: api-companyid-dimensions
      description: REST surface for api-companyId-dimensions.
      operations:
      - method: GET
        name: listdimensions
        description: Adobe Analytics Adobe Experience Cloud List Dimensions
        call: adobe-analytics-dimensions.listdimensions
        with:
          companyId: rest.companyId
          rsid: rest.rsid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: adobe-analytics-dimensions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adobe Experience Cloud Adobe Analytics 2.0 API — Dimensions. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: adobe-analytics-adobe-experience-cloud
      description: Adobe Analytics Adobe Experience Cloud List Dimensions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: adobe-analytics-dimensions.listdimensions
      with:
        companyId: tools.companyId
        rsid: tools.rsid
      outputParameters:
      - type: object
        mapping: $.
