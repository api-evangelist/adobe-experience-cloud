naftiko: "1.0.0-alpha1"

info:
  label: "Adobe Analytics 2.0 API"
  description: "REST API for Adobe Analytics reporting, segment management, calculated metrics, and report suite administration."
  tags:
    - Adobe Analytics
    - Analytics
    - Digital Marketing
    - Reporting
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ADOBE_ANALYTICS_ACCESS_TOKEN: ADOBE_ANALYTICS_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: analytics-api
      baseUri: https://analytics.adobe.io/api/{companyId}
      description: "Adobe Analytics 2.0 REST API for reports and management."
      authentication:
        type: bearer
        token: "{{ADOBE_ANALYTICS_ACCESS_TOKEN}}"
      resources:
        - name: reports
          path: /reports
          description: "Run and retrieve analytics reports."
          operations:
            - name: run-report
              method: POST
              description: "Run an analytics report with dimensions, metrics, and date ranges."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  rsid: "{{tools.rsid}}"
                  globalFilters: []
                  metricContainer: {}

        - name: segments
          path: /segments
          description: "Manage audience segments."
          operations:
            - name: list-segments
              method: GET
              description: "List all segments in the account."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-segment
              method: POST
              description: "Create a new segment."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  rsid: "{{tools.rsid}}"

        - name: metrics
          path: /metrics
          description: "Retrieve available metrics for a report suite."
          operations:
            - name: list-metrics
              method: GET
              description: "List all metrics for a report suite."
              inputParameters:
                - name: rsid
                  in: query
                  type: string
                  required: true
                  description: "Report Suite ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: dimensions
          path: /dimensions
          description: "Retrieve available dimensions for a report suite."
          operations:
            - name: list-dimensions
              method: GET
              description: "List all dimensions for a report suite."
              inputParameters:
                - name: rsid
                  in: query
                  type: string
                  required: true
                  description: "Report Suite ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: analytics-rest
      resources:
        - path: /v1/reports
          name: reports
          description: "Analytics report execution."
          operations:
            - method: POST
              name: run-report
              description: "Run an analytics report."
              call: "analytics-api.run-report"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: analytics-mcp
      transport: http
      tools:
        - name: run-analytics-report
          description: "Run an Adobe Analytics report with metrics and dimensions."
          hints:
            readOnly: true
            openWorld: true
          call: "analytics-api.run-report"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-segments
          description: "List audience segments in Adobe Analytics."
          hints:
            readOnly: true
            openWorld: true
          call: "analytics-api.list-segments"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-metrics
          description: "List available metrics for an Adobe Analytics report suite."
          hints:
            readOnly: true
            openWorld: true
          call: "analytics-api.list-metrics"
          with:
            rsid: "tools.rsid"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-dimensions
          description: "List available dimensions for an Adobe Analytics report suite."
          hints:
            readOnly: true
            openWorld: true
          call: "analytics-api.list-dimensions"
          with:
            rsid: "tools.rsid"
          outputParameters:
            - type: object
              mapping: "$."
