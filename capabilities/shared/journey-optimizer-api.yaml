naftiko: "1.0.0-alpha1"

info:
  label: "Adobe Journey Optimizer API"
  description: "REST API for managing customer journeys, campaigns, messages, offers, and content templates across email, push, SMS, and in-app channels."
  tags:
    - Adobe Journey Optimizer
    - Journey Orchestration
    - Messaging
    - Offer Decisioning
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ADOBE_AJO_ACCESS_TOKEN: ADOBE_AJO_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: journey-optimizer
      baseUri: https://platform.adobe.io
      description: "Adobe Journey Optimizer API for journey and campaign management."
      authentication:
        type: bearer
        token: "{{ADOBE_AJO_ACCESS_TOKEN}}"
      resources:
        - name: journeys
          path: /journey/journeyVersions
          description: "Manage customer journeys."
          operations:
            - name: list-journeys
              method: GET
              description: "List all journey versions."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: messages
          path: /ajo/message
          description: "Manage campaign messages."
          operations:
            - name: list-messages
              method: GET
              description: "List all messages."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: offers
          path: /offer_library/offers
          description: "Manage personalized offers."
          operations:
            - name: list-offers
              method: GET
              description: "List all offers."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-offer
              method: POST
              description: "Create a personalized offer."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  status: "draft"

  exposes:
    - type: rest
      port: 8104
      namespace: journey-optimizer-rest
      resources:
        - path: /v1/journeys
          name: journeys
          description: "Customer journey management."
          operations:
            - method: GET
              name: list-journeys
              description: "List journeys."
              call: "journey-optimizer.list-journeys"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/offers
          name: offers
          description: "Offer management."
          operations:
            - method: GET
              name: list-offers
              description: "List offers."
              call: "journey-optimizer.list-offers"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9104
      namespace: journey-optimizer-mcp
      transport: http
      tools:
        - name: list-journeys
          description: "List customer journeys in Adobe Journey Optimizer."
          hints:
            readOnly: true
            openWorld: true
          call: "journey-optimizer.list-journeys"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-messages
          description: "List campaign messages in Adobe Journey Optimizer."
          hints:
            readOnly: true
            openWorld: true
          call: "journey-optimizer.list-messages"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-offers
          description: "List personalized offers in Adobe Journey Optimizer."
          hints:
            readOnly: true
            openWorld: true
          call: "journey-optimizer.list-offers"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-offer
          description: "Create a new personalized offer in Adobe Journey Optimizer."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "journey-optimizer.create-offer"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
