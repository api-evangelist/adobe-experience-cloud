naftiko: "1.0.0-alpha1"

info:
  label: "Adobe Experience Platform API"
  description: "REST API for managing real-time customer profiles, data ingestion, identity resolution, schema registry, datasets, and audience segmentation."
  tags:
    - Adobe Experience Platform
    - Customer Data Platform
    - Data Management
    - Real-Time Profiles
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ADOBE_PLATFORM_ACCESS_TOKEN: ADOBE_PLATFORM_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: experience-platform
      baseUri: https://platform.adobe.io
      description: "Adobe Experience Platform REST API."
      authentication:
        type: bearer
        token: "{{ADOBE_PLATFORM_ACCESS_TOKEN}}"
      resources:
        - name: profiles
          path: /data/core/ups/access/entities
          description: "Unified Profile access and management."
          operations:
            - name: get-profile
              method: GET
              description: "Retrieve a unified customer profile by identity."
              inputParameters:
                - name: schema.name
                  in: query
                  type: string
                  required: true
                  description: "Profile schema class name."
                - name: entityId
                  in: query
                  type: string
                  required: true
                  description: "Entity identity value."
                - name: entityIdNS
                  in: query
                  type: string
                  required: true
                  description: "Identity namespace."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: datasets
          path: /data/foundation/catalog/datasets
          description: "Dataset management."
          operations:
            - name: list-datasets
              method: GET
              description: "List all datasets in the organization."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: segments
          path: /data/core/ups/segment/definitions
          description: "Audience segment definitions."
          operations:
            - name: list-segments
              method: GET
              description: "List audience segment definitions."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-segment
              method: POST
              description: "Create a new audience segment definition."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  expression:
                    type: "PQL"
                    format: "pql/text"
                    value: "{{tools.pqlExpression}}"

  exposes:
    - type: rest
      port: 8102
      namespace: experience-platform-rest
      resources:
        - path: /v1/profiles
          name: profiles
          description: "Customer profile access."
          operations:
            - method: GET
              name: get-profile
              description: "Get a customer profile."
              call: "experience-platform.get-profile"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/segments
          name: segments
          description: "Audience segments."
          operations:
            - method: GET
              name: list-segments
              description: "List segments."
              call: "experience-platform.list-segments"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: experience-platform-mcp
      transport: http
      tools:
        - name: get-customer-profile
          description: "Retrieve a unified customer profile from Adobe Experience Platform by identity."
          hints:
            readOnly: true
            openWorld: false
          call: "experience-platform.get-profile"
          with:
            entityId: "tools.entityId"
            entityIdNS: "tools.entityIdNS"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-datasets
          description: "List all data sets in Adobe Experience Platform."
          hints:
            readOnly: true
            openWorld: true
          call: "experience-platform.list-datasets"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-audience-segments
          description: "List audience segment definitions in Adobe Experience Platform."
          hints:
            readOnly: true
            openWorld: true
          call: "experience-platform.list-segments"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-audience-segment
          description: "Create a new audience segment definition using PQL expression."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "experience-platform.create-segment"
          with:
            name: "tools.name"
            pqlExpression: "tools.pqlExpression"
          outputParameters:
            - type: object
              mapping: "$."
