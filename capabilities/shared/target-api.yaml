naftiko: "1.0.0-alpha1"

info:
  label: "Adobe Target API"
  description: "REST API for managing A/B tests, experience targeting, automated personalization, audiences, and offers in Adobe Target."
  tags:
    - Adobe Target
    - Personalization
    - A/B Testing
    - Optimization
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ADOBE_TARGET_ACCESS_TOKEN: ADOBE_TARGET_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: target-api
      baseUri: https://mc.adobe.io/{tenant}/target
      description: "Adobe Target REST API for personalization and testing."
      authentication:
        type: bearer
        token: "{{ADOBE_TARGET_ACCESS_TOKEN}}"
      resources:
        - name: activities
          path: /activities
          description: "Manage A/B tests and personalization activities."
          operations:
            - name: list-activities
              method: GET
              description: "List all activities."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-ab-activity
              method: POST
              description: "Create a new A/B test activity."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  type: "ab"

        - name: audiences
          path: /audiences
          description: "Manage target audiences."
          operations:
            - name: list-audiences
              method: GET
              description: "List all audiences."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: offers
          path: /offers/content
          description: "Manage content offers."
          operations:
            - name: list-offers
              method: GET
              description: "List all content offers."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: target-rest
      resources:
        - path: /v1/activities
          name: activities
          description: "Testing activities."
          operations:
            - method: GET
              name: list-activities
              description: "List activities."
              call: "target-api.list-activities"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: target-mcp
      transport: http
      tools:
        - name: list-activities
          description: "List all A/B test and personalization activities in Adobe Target."
          hints:
            readOnly: true
            openWorld: true
          call: "target-api.list-activities"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-audiences
          description: "List all targeting audiences in Adobe Target."
          hints:
            readOnly: true
            openWorld: true
          call: "target-api.list-audiences"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-offers
          description: "List all content offers in Adobe Target."
          hints:
            readOnly: true
            openWorld: true
          call: "target-api.list-offers"
          outputParameters:
            - type: object
              mapping: "$."
