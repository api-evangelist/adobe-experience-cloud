naftiko: 1.0.0-alpha2
info:
  label: Adobe Experience Cloud Adobe Analytics 2.0 API — Projects
  description: 'Adobe Experience Cloud Adobe Analytics 2.0 API — Projects. 2 operations. Lead operation: Adobe Analytics Adobe
    Experience Cloud List Projects. Self-contained Naftiko capability covering one Adobe Experience Cloud business surface.'
  tags:
  - Adobe Experience Cloud
  - Projects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADOBE_EXPERIENCE_CLOUD_API_KEY: ADOBE_EXPERIENCE_CLOUD_API_KEY
capability:
  consumes:
  - type: http
    namespace: adobe-analytics-projects
    baseUri: https://analytics.adobe.io
    description: Adobe Experience Cloud Adobe Analytics 2.0 API — Projects business capability. Self-contained, no shared
      references.
    resources:
    - name: api-companyId-projects
      path: /api/{companyId}/projects
      operations:
      - name: listprojects
        method: GET
        description: Adobe Analytics Adobe Experience Cloud List Projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: companyId
          in: path
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: page
          in: query
          type: integer
    - name: api-companyId-projects-projectId
      path: /api/{companyId}/projects/{projectId}
      operations:
      - name: getproject
        method: GET
        description: Adobe Analytics Adobe Experience Cloud Get a Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: companyId
          in: path
          type: string
          required: true
        - name: projectId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.ADOBE_EXPERIENCE_CLOUD_API_KEY}}'
  exposes:
  - type: rest
    namespace: adobe-analytics-projects-rest
    port: 8080
    description: REST adapter for Adobe Experience Cloud Adobe Analytics 2.0 API — Projects. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/api/{companyid}/projects
      name: api-companyid-projects
      description: REST surface for api-companyId-projects.
      operations:
      - method: GET
        name: listprojects
        description: Adobe Analytics Adobe Experience Cloud List Projects
        call: adobe-analytics-projects.listprojects
        with:
          companyId: rest.companyId
          limit: rest.limit
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/{companyid}/projects/{projectid}
      name: api-companyid-projects-projectid
      description: REST surface for api-companyId-projects-projectId.
      operations:
      - method: GET
        name: getproject
        description: Adobe Analytics Adobe Experience Cloud Get a Project
        call: adobe-analytics-projects.getproject
        with:
          companyId: rest.companyId
          projectId: rest.projectId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: adobe-analytics-projects-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adobe Experience Cloud Adobe Analytics 2.0 API — Projects. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: adobe-analytics-adobe-experience-cloud
      description: Adobe Analytics Adobe Experience Cloud List Projects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: adobe-analytics-projects.listprojects
      with:
        companyId: tools.companyId
        limit: tools.limit
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
    - name: adobe-analytics-adobe-experience-cloud-2
      description: Adobe Analytics Adobe Experience Cloud Get a Project
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: adobe-analytics-projects.getproject
      with:
        companyId: tools.companyId
        projectId: tools.projectId
      outputParameters:
      - type: object
        mapping: $.
