naftiko: "1.0.0-alpha1"

info:
  label: "Adobe Experience Cloud Digital Marketing"
  description: "Unified workflow capability combining Adobe Analytics, Adobe Target, and Adobe Journey Optimizer for data-driven marketing campaigns, A/B testing, and personalized journey orchestration. Designed for digital marketers and marketing technologists."
  tags:
    - Adobe Experience Cloud
    - Digital Marketing
    - Analytics
    - Personalization
    - Journey Orchestration
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ADOBE_ANALYTICS_ACCESS_TOKEN: ADOBE_ANALYTICS_ACCESS_TOKEN
      ADOBE_TARGET_ACCESS_TOKEN: ADOBE_TARGET_ACCESS_TOKEN
      ADOBE_AJO_ACCESS_TOKEN: ADOBE_AJO_ACCESS_TOKEN

capability:
  consumes:
    - import: analytics-api
      location: ./shared/analytics-api.yaml
    - import: target-api
      location: ./shared/target-api.yaml
    - import: journey-optimizer
      location: ./shared/journey-optimizer-api.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: digital-marketing-api
      description: "Unified REST API for Adobe Experience Cloud digital marketing — analytics, personalization, journeys, and offers."
      resources:
        - path: /v1/reports
          name: reports
          description: "Analytics report execution."
          operations:
            - method: POST
              name: run-report
              description: "Run an Adobe Analytics report."
              call: "analytics-api.run-report"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/segments
          name: segments
          description: "Audience segment management."
          operations:
            - method: GET
              name: list-segments
              description: "List analytics segments."
              call: "analytics-api.list-segments"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/activities
          name: activities
          description: "A/B test and personalization activities."
          operations:
            - method: GET
              name: list-activities
              description: "List Target activities."
              call: "target-api.list-activities"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/audiences
          name: audiences
          description: "Target audiences."
          operations:
            - method: GET
              name: list-audiences
              description: "List Target audiences."
              call: "target-api.list-audiences"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/journeys
          name: journeys
          description: "Customer journeys."
          operations:
            - method: GET
              name: list-journeys
              description: "List Journey Optimizer journeys."
              call: "journey-optimizer.list-journeys"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/offers
          name: offers
          description: "Personalized offers."
          operations:
            - method: GET
              name: list-offers
              description: "List Journey Optimizer offers."
              call: "journey-optimizer.list-offers"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: digital-marketing-mcp
      transport: http
      description: "MCP server for AI-assisted digital marketing — analyze campaigns, test personalization, orchestrate journeys, and manage offers."
      tools:
        - name: run-analytics-report
          description: "Run an Adobe Analytics report with dimensions, metrics, and segments."
          hints:
            readOnly: true
            openWorld: true
          call: "analytics-api.run-report"
          outputParameters:
            - type: object
              mapping: "$."
        - name: analytics-list-segments
          description: "List audience segments in Adobe Analytics."
          hints:
            readOnly: true
            openWorld: true
          call: "analytics-api.list-segments"
          outputParameters:
            - type: object
              mapping: "$."
        - name: analytics-list-metrics
          description: "List available metrics for an Adobe Analytics report suite."
          hints:
            readOnly: true
            openWorld: true
          call: "analytics-api.list-metrics"
          with:
            rsid: "tools.rsid"
          outputParameters:
            - type: object
              mapping: "$."
        - name: target-list-activities
          description: "List A/B test and personalization activities in Adobe Target."
          hints:
            readOnly: true
            openWorld: true
          call: "target-api.list-activities"
          outputParameters:
            - type: object
              mapping: "$."
        - name: target-list-audiences
          description: "List targeting audiences in Adobe Target."
          hints:
            readOnly: true
            openWorld: true
          call: "target-api.list-audiences"
          outputParameters:
            - type: object
              mapping: "$."
        - name: target-list-offers
          description: "List content offers in Adobe Target."
          hints:
            readOnly: true
            openWorld: true
          call: "target-api.list-offers"
          outputParameters:
            - type: object
              mapping: "$."
        - name: ajo-list-journeys
          description: "List customer journeys in Adobe Journey Optimizer."
          hints:
            readOnly: true
            openWorld: true
          call: "journey-optimizer.list-journeys"
          outputParameters:
            - type: object
              mapping: "$."
        - name: ajo-list-offers
          description: "List personalized offers in Adobe Journey Optimizer."
          hints:
            readOnly: true
            openWorld: true
          call: "journey-optimizer.list-offers"
          outputParameters:
            - type: object
              mapping: "$."
        - name: ajo-create-offer
          description: "Create a new personalized offer in Adobe Journey Optimizer."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "journey-optimizer.create-offer"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: ajo-list-messages
          description: "List campaign messages in Adobe Journey Optimizer."
          hints:
            readOnly: true
            openWorld: true
          call: "journey-optimizer.list-messages"
          outputParameters:
            - type: object
              mapping: "$."
