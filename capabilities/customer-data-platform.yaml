naftiko: "1.0.0-alpha1"

info:
  label: "Adobe Experience Cloud Customer Data Platform"
  description: "Unified workflow for managing real-time customer profiles, audience segmentation, and data ingestion using Adobe Experience Platform. Designed for data engineers and customer data platform administrators."
  tags:
    - Adobe Experience Platform
    - Customer Data Platform
    - Real-Time Profiles
    - Data Management
    - Audience Segmentation
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ADOBE_PLATFORM_ACCESS_TOKEN: ADOBE_PLATFORM_ACCESS_TOKEN

capability:
  consumes:
    - import: experience-platform
      location: ./shared/experience-platform-api.yaml

  exposes:
    - type: rest
      port: 8081
      namespace: customer-data-platform-api
      description: "Unified REST API for Adobe Experience Platform — profiles, datasets, and audience segments."
      resources:
        - path: /v1/profiles
          name: profiles
          description: "Unified customer profiles."
          operations:
            - method: GET
              name: get-profile
              description: "Get a unified customer profile."
              call: "experience-platform.get-profile"
              with:
                entityId: "rest.entityId"
                entityIdNS: "rest.entityIdNS"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/datasets
          name: datasets
          description: "Data sets."
          operations:
            - method: GET
              name: list-datasets
              description: "List all datasets."
              call: "experience-platform.list-datasets"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/segments
          name: segments
          description: "Audience segments."
          operations:
            - method: GET
              name: list-segments
              description: "List audience segments."
              call: "experience-platform.list-segments"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-segment
              description: "Create a new audience segment."
              call: "experience-platform.create-segment"
              with:
                name: "rest.name"
                pqlExpression: "rest.pqlExpression"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9091
      namespace: customer-data-platform-mcp
      transport: http
      description: "MCP server for AI-assisted customer data management — query profiles, discover datasets, manage audience segments."
      tools:
        - name: get-customer-profile
          description: "Retrieve a unified real-time customer profile from Adobe Experience Platform by identity."
          hints:
            readOnly: true
            openWorld: false
          call: "experience-platform.get-profile"
          with:
            entityId: "tools.entityId"
            entityIdNS: "tools.entityIdNS"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-datasets
          description: "List all datasets ingested into Adobe Experience Platform."
          hints:
            readOnly: true
            openWorld: true
          call: "experience-platform.list-datasets"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-audience-segments
          description: "List audience segment definitions in Adobe Experience Platform."
          hints:
            readOnly: true
            openWorld: true
          call: "experience-platform.list-segments"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-audience-segment
          description: "Create a new audience segment using PQL expression in Adobe Experience Platform."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "experience-platform.create-segment"
          with:
            name: "tools.name"
            pqlExpression: "tools.pqlExpression"
          outputParameters:
            - type: object
              mapping: "$."
