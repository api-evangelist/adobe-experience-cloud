naftiko: 1.0.0-alpha2
info:
  label: Adobe Experience Cloud Adobe Campaign API — Content
  description: 'Adobe Experience Cloud Adobe Campaign API — Content. 2 operations. Lead operation: Adobe Campaign Adobe Experience
    Cloud List Email Deliveries. Self-contained Naftiko capability covering one Adobe Experience Cloud business surface.'
  tags:
  - Adobe Experience Cloud
  - Content
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADOBE_EXPERIENCE_CLOUD_API_KEY: ADOBE_EXPERIENCE_CLOUD_API_KEY
capability:
  consumes:
  - type: http
    namespace: adobe-campaign-content
    baseUri: https://mc.adobe.io/{organization}
    description: Adobe Experience Cloud Adobe Campaign API — Content business capability. Self-contained, no shared references.
    resources:
    - name: campaign-email
      path: /campaign/email
      operations:
      - name: listemails
        method: GET
        description: Adobe Campaign Adobe Experience Cloud List Email Deliveries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: _lineCount
          in: query
          type: integer
    - name: campaign-email-emailPKey
      path: /campaign/email/{emailPKey}
      operations:
      - name: getemail
        method: GET
        description: Adobe Campaign Adobe Experience Cloud Get an Email Delivery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: emailPKey
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.ADOBE_EXPERIENCE_CLOUD_API_KEY}}'
  exposes:
  - type: rest
    namespace: adobe-campaign-content-rest
    port: 8080
    description: REST adapter for Adobe Experience Cloud Adobe Campaign API — Content. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/campaign/email
      name: campaign-email
      description: REST surface for campaign-email.
      operations:
      - method: GET
        name: listemails
        description: Adobe Campaign Adobe Experience Cloud List Email Deliveries
        call: adobe-campaign-content.listemails
        with:
          _lineCount: rest._lineCount
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/campaign/email/{emailpkey}
      name: campaign-email-emailpkey
      description: REST surface for campaign-email-emailPKey.
      operations:
      - method: GET
        name: getemail
        description: Adobe Campaign Adobe Experience Cloud Get an Email Delivery
        call: adobe-campaign-content.getemail
        with:
          emailPKey: rest.emailPKey
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: adobe-campaign-content-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adobe Experience Cloud Adobe Campaign API — Content. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: adobe-campaign-adobe-experience-cloud
      description: Adobe Campaign Adobe Experience Cloud List Email Deliveries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: adobe-campaign-content.listemails
      with:
        _lineCount: tools._lineCount
      outputParameters:
      - type: object
        mapping: $.
    - name: adobe-campaign-adobe-experience-cloud-2
      description: Adobe Campaign Adobe Experience Cloud Get an Email Delivery
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: adobe-campaign-content.getemail
      with:
        emailPKey: tools.emailPKey
      outputParameters:
      - type: object
        mapping: $.
