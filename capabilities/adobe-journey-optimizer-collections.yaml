        name: listcollections
        description: Adobe Journey Optimizer Adobe Experience Cloud List Collections
        call: adobe-journey-optimizer-collections.listcollections
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcollection
        description: Adobe Journey Optimizer Adobe Experience Cloud Create a Collection
        call: adobe-journey-optimizer-collections.createcollection
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
