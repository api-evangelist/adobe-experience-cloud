    port: 9090
    transport: http
    description: MCP adapter for Adobe Experience Cloud Adobe Journey Optimizer API — Collections. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: adobe-journey-optimizer-adobe-experience
      description: Adobe Journey Optimizer Adobe Experience Cloud List Collections
      hints:
        readOnly: true
        destructive: false
        idempotent: true
