naftiko: 1.0.0-alpha2
info:
  label: Adobe Experience Cloud Adobe Analytics 2.0 API — Users
  description: 'Adobe Experience Cloud Adobe Analytics 2.0 API — Users. 2 operations. Lead operation: Adobe Analytics Adobe
    Experience Cloud List Users. Self-contained Naftiko capability covering one Adobe Experience Cloud business surface.'
  tags:
  - Adobe Experience Cloud
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADOBE_EXPERIENCE_CLOUD_API_KEY: ADOBE_EXPERIENCE_CLOUD_API_KEY
capability:
  consumes:
  - type: http
    namespace: adobe-analytics-users
    baseUri: https://analytics.adobe.io
    description: Adobe Experience Cloud Adobe Analytics 2.0 API — Users business capability. Self-contained, no shared references.
    resources:
    - name: api-companyId-users
      path: /api/{companyId}/users
      operations:
      - name: listusers
        method: GET
        description: Adobe Analytics Adobe Experience Cloud List Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: companyId
          in: path
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: page
          in: query
          type: integer
    - name: api-companyId-users-userId
      path: /api/{companyId}/users/{userId}
      operations:
      - name: getuser
        method: GET
        description: Adobe Analytics Adobe Experience Cloud Get a User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: companyId
          in: path
          type: string
          required: true
        - name: userId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.ADOBE_EXPERIENCE_CLOUD_API_KEY}}'
  exposes:
  - type: rest
    namespace: adobe-analytics-users-rest
    port: 8080
    description: REST adapter for Adobe Experience Cloud Adobe Analytics 2.0 API — Users. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/api/{companyid}/users
      name: api-companyid-users
      description: REST surface for api-companyId-users.
      operations:
      - method: GET
        name: listusers
        description: Adobe Analytics Adobe Experience Cloud List Users
        call: adobe-analytics-users.listusers
        with:
          companyId: rest.companyId
          limit: rest.limit
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/{companyid}/users/{userid}
      name: api-companyid-users-userid
      description: REST surface for api-companyId-users-userId.
      operations:
      - method: GET
        name: getuser
        description: Adobe Analytics Adobe Experience Cloud Get a User
        call: adobe-analytics-users.getuser
        with:
          companyId: rest.companyId
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: adobe-analytics-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adobe Experience Cloud Adobe Analytics 2.0 API — Users. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: adobe-analytics-adobe-experience-cloud
      description: Adobe Analytics Adobe Experience Cloud List Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: adobe-analytics-users.listusers
      with:
        companyId: tools.companyId
        limit: tools.limit
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
    - name: adobe-analytics-adobe-experience-cloud-2
      description: Adobe Analytics Adobe Experience Cloud Get a User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: adobe-analytics-users.getuser
      with:
        companyId: tools.companyId
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
