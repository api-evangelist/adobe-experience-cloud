naftiko: 1.0.0-alpha2
info:
  label: Adobe Experience Cloud Adobe Journey Optimizer API — Content Templates
  description: 'Adobe Experience Cloud Adobe Journey Optimizer API — Content Templates. 2 operations. Lead operation: Adobe
    Journey Optimizer Adobe Experience Cloud List Content Templates. Self-contained Naftiko capability covering one Adobe
    Experience Cloud business surface.'
  tags:
  - Adobe Experience Cloud
  - Content Templates
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADOBE_EXPERIENCE_CLOUD_API_KEY: ADOBE_EXPERIENCE_CLOUD_API_KEY
capability:
  consumes:
  - type: http
    namespace: adobe-journey-optimizer-content-templates
    baseUri: https://platform.adobe.io
    description: Adobe Experience Cloud Adobe Journey Optimizer API — Content Templates business capability. Self-contained,
      no shared references.
    resources:
    - name: content-templates
      path: /content/templates
      operations:
      - name: listcontenttemplates
        method: GET
        description: Adobe Journey Optimizer Adobe Experience Cloud List Content Templates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
      - name: createcontenttemplate
        method: POST
        description: Adobe Journey Optimizer Adobe Experience Cloud Create a Content Template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ADOBE_EXPERIENCE_CLOUD_API_KEY}}'
  exposes:
  - type: rest
    namespace: adobe-journey-optimizer-content-templates-rest
    port: 8080
    description: REST adapter for Adobe Experience Cloud Adobe Journey Optimizer API — Content Templates. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/content/templates
      name: content-templates
      description: REST surface for content-templates.
      operations:
      - method: GET
        name: listcontenttemplates
        description: Adobe Journey Optimizer Adobe Experience Cloud List Content Templates
        call: adobe-journey-optimizer-content-templates.listcontenttemplates
        with:
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcontenttemplate
        description: Adobe Journey Optimizer Adobe Experience Cloud Create a Content Template
        call: adobe-journey-optimizer-content-templates.createcontenttemplate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: adobe-journey-optimizer-content-templates-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adobe Experience Cloud Adobe Journey Optimizer API — Content Templates. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: adobe-journey-optimizer-adobe-experience
      description: Adobe Journey Optimizer Adobe Experience Cloud List Content Templates
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: adobe-journey-optimizer-content-templates.listcontenttemplates
      with:
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: adobe-journey-optimizer-adobe-experience-2
      description: Adobe Journey Optimizer Adobe Experience Cloud Create a Content Template
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: adobe-journey-optimizer-content-templates.createcontenttemplate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
