specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Adobe Experience Cloud
providerId: adobe-experience-cloud
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Experience Cloud
  - Customer Data Platform
  - Analytics
notes: >-
  Experience Cloud spans many enterprise SKUs (Analytics, Real-Time CDP,
  Target, Journey Optimizer, AEM, Marketo, Workfront, Commerce); each has
  its own commit unit (server calls, profiles, MAUs, GMV, seats). FinOps
  levers focus on commit / overage management across the bundle.
description: >-
  FOCUS-aligned FinOps shape for Adobe Experience Cloud: enterprise
  contract licensing across multiple SKUs each keyed to a product-specific
  commit unit. API access is included with each product license.
sources:
  - https://business.adobe.com/products/experience-cloud-products.html
  - https://developer.adobe.com/experience-platform-apis/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Adobe Inc.
serviceCategory: Marketing + Analytics + DXP SaaS
billingModel:
  pricingCategory: Enterprise Contract
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Adobe Experience Cloud
  ServiceCategory: Marketing + Analytics + DXP SaaS
  ProviderName: Adobe
  PublisherName: Adobe Inc.
  InvoiceIssuerName: Adobe Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: server_calls
    description: Adobe Analytics server-call commit
    unit: server_call
    aggregation: sum
    dimensions:
      - report_suite
  - name: addressable_profiles
    description: Real-Time CDP / Journey Optimizer / Campaign profile commit
    unit: profile-month
    aggregation: max
    dimensions:
      - sandbox
      - product
  - name: cja_rows
    description: Customer Journey Analytics analyzable-row commit
    unit: row
    aggregation: sum
    dimensions:
      - dataset
  - name: target_visitors
    description: Adobe Target qualified-visitor commit
    unit: visitor
    aggregation: sum
    dimensions:
      - client-code
  - name: aem_assets_storage
    description: AEM Assets storage and bandwidth (where applicable)
    unit: GB-month
    aggregation: max
    dimensions:
      - tenant
  - name: marketo_database
    description: Marketo Engage database size commit
    unit: contact-month
    aggregation: max
    dimensions:
      - workspace
  - name: workfront_seats
    description: Adobe Workfront named-user licenses
    unit: seat-month
    aggregation: sum
    dimensions:
      - role
  - name: commerce_gmv
    description: Adobe Commerce GMV-tiered commit
    unit: USD
    aggregation: sum
    dimensions:
      - storefront
principles:
  - name: Visibility
    description: >-
      Use the Adobe Experience Platform Sandbox dashboard, Analytics Server
      Call Usage report, Target Activations report, and AEM Assets storage
      meter to track each commit unit against contract.
  - name: Allocation
    description: >-
      Use sandbox-per-business-unit naming, report-suite-per-property, and
      Marketo workspace partitions to attribute Experience Cloud spend to
      business owners.
  - name: Optimization
    description: >-
      Right-size commit at renewal; archive unused datasets in Real-Time CDP;
      consolidate duplicate Target activities; deprecate stale Marketo
      programs; review AEM asset retention to control storage.
  - name: Accountability
    description: >-
      Adobe TAM / CSM run quarterly business reviews against each product's
      commit; finance owns true-up reconciliation and overage billing at
      year-end.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
