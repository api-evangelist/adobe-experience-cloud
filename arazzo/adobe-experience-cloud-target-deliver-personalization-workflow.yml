arazzo: 1.0.1
info:
  title: Adobe Target Deliver Personalization
  summary: List available offers, then fetch personalized content for a visitor session.
  description: >-
    Exercises the Adobe Target delivery path. The workflow first lists the
    offers available in the account, then calls the Delivery API to fetch
    personalized content for a visitor session by executing and prefetching
    mbox decisions. Because the listOffers operationId also exists in the Adobe
    Journey Optimizer description, the list step references its operation through
    the targetApi source. Each step inlines the bearer token and API key so the
    flow can be read and executed without opening the underlying OpenAPI
    description.
  version: 1.0.0
sourceDescriptions:
- name: targetApi
  url: ../openapi/adobe-target-api-openapi.yml
  type: openapi
workflows:
- workflowId: deliver-personalization
  summary: List offers and deliver personalized content for a session.
  description: >-
    Lists the offers in the account, then fetches personalized content for a
    visitor session via the Delivery API.
  inputs:
    type: object
    required:
    - authorization
    - apiKey
    - client
    - sessionId
    properties:
      authorization:
        type: string
        description: Bearer access token.
      apiKey:
        type: string
        description: Adobe API key for the x-api-key header.
      client:
        type: string
        description: Adobe Target client code.
      sessionId:
        type: string
        description: Visitor session id.
  steps:
  - stepId: listOffers
    description: List the offers available in the Target account.
    operationId: $sourceDescriptions.targetApi.listOffers
    parameters:
    - name: Authorization
      in: header
      value: $inputs.authorization
    - name: x-api-key
      in: header
      value: $inputs.apiKey
    successCriteria:
    - condition: $statusCode == 200
    outputs:
      offers: $response.body
  - stepId: deliverExperiences
    description: >-
      Fetch personalized content for the visitor session via the Delivery API,
      executing and prefetching mbox decisions.
    operationId: deliverExperiences
    parameters:
    - name: client
      in: query
      value: $inputs.client
    - name: sessionId
      in: query
      value: $inputs.sessionId
    - name: Authorization
      in: header
      value: $inputs.authorization
    - name: x-api-key
      in: header
      value: $inputs.apiKey
    requestBody:
      contentType: application/json
      payload:
        context:
          channel: web
          userAgent: example
        execute:
          mboxes:
          - name: {}
            index: {}
        prefetch:
          views:
          - {}
    successCriteria:
    - condition: $statusCode == 200
    outputs:
      delivery: $response.body
  outputs:
    offers: $steps.listOffers.outputs.offers
    delivery: $steps.deliverExperiences.outputs.delivery
