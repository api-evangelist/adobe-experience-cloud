specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Adobe Experience Cloud
providerId: adobe-experience-cloud
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Experience Cloud
  - Customer Data Platform
notes: >-
  Each Experience Cloud product publishes its own throttling envelope
  (Experience Platform APIs use sandbox-scoped quotas, Target Delivery API
  uses MBox-scoped pacing, AEM as a Cloud Service runs per-tenant
  throttles). Specific numeric ceilings are configuration-dependent and
  defer to the per-product developer docs.
description: >-
  Adobe Experience Cloud is a multi-product platform; rate limits vary per
  service and per sandbox / tenant. Throttling responses are 429 across the
  family; sustained excess on Edge Network endpoints can shed to 503.
  Numeric ceilings are not unified and defer to product-specific docs.
sources:
  - https://developer.adobe.com/experience-platform-apis/
  - https://developer.adobe.com/target/
  - https://developer.adobe.com/experience-cloud/experience-manager-apis/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Experience Platform APIs (per sandbox)
    scope: sandbox
    metric: requests_per_minute
    limit: see https://developer.adobe.com/experience-platform-apis/
    notes: >-
      Sandbox-scoped throttling on the Catalog, Schema Registry, Data
      Ingestion, Query Service, and Profile APIs.
  - name: Target Delivery API
    scope: client-code
    metric: requests_per_second
    limit: see https://developer.adobe.com/target/
    notes: >-
      High-throughput edge endpoint with per-client-code pacing; concurrent
      visitors and decisioning capacity vary by SKU.
  - name: AEM as a Cloud Service
    scope: tenant
    metric: requests_per_minute
    limit: see https://experienceleague.adobe.com/docs/experience-manager-cloud-service.html
    notes: >-
      Per-tenant throttles plus dispatcher / CDN caching layer in front.
  - name: CJA Reporting API
    scope: company
    metric: requests_per_minute
    limit: see https://developer.adobe.com/cja-apis/
    notes: Per-company throttle similar to Adobe Analytics 2.0.
policies:
  - name: Backoff Strategy
    description: Exponential backoff with jitter; honor Retry-After when present.
  - name: Sandbox isolation
    description: >-
      Experience Platform throttling is per-sandbox; production and dev
      sandboxes have independent quotas.
  - name: Edge vs control plane
    description: >-
      Edge Network endpoints (Target, Edge Network, Web SDK) are tuned for
      high-RPS visitor traffic; control-plane APIs (Catalog, Schema, Query)
      are tuned for ops workloads with lower TPS but higher per-call cost.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
