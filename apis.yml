description: >-
  Adobe Experience Cloud is an integrated suite of applications and services
  for digital marketing, analytics, advertising, and commerce. It provides
  tools for content management, personalization, customer journey
  orchestration, audience segmentation, real-time customer data platforms,
  offer decisioning, and cross-channel campaign execution, enabling
  organizations to deliver personalized customer experiences at scale.
